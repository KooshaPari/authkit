name: AuthKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions:
  contents: read
jobs:
  # Rust CI
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test Rust
        run: cd rust && cargo test --all-features

  # Python CI
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Test Python
        run: cd python && poetry install && poetry run pytest

  # Go CI
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Go
        uses: actions/setup-go@367f1f9bcc2a26fc43b53a89f3c47d882b7e25a4
        with:
          go-version: '1.25'
      - name: Test Go
        run: cd go && go test ./...

  # TypeScript CI
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
      - name: Test TypeScript
        run: cd typescript && npm install && npm test
