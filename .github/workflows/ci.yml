name: AuthKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


permissions:
  contents: read
jobs:
  # Rust CI
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Test Rust
        run: cd rust && cargo test --all-features

  # Python CI
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Test Python
        run: cd python && poetry install && poetry run pytest

  # Go CI
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Go
        uses: actions/setup-go@1e17b89b4a10c5e0e1e5f4b5c5e1d4e2a8b9c5d
        with:
          go-version: '1.25'
      - name: Test Go
        run: cd go && go test ./...

  # TypeScript CI
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Test TypeScript
        run: cd typescript && npm install && npm test
