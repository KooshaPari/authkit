name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - 'tests/**'
      - 'benches/**'
      - 'examples/**'
      - '**/*_test.rs'
      - '**/tests/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'tests/**'
      - 'benches/**'
      - 'examples/**'
      - '**/*_test.rs'
      - '**/tests/**'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [rust, python, actions]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Exclude test/bench/example fixtures from analysis to suppress
          # rust/hard-coded-cryptographic-value false positives on test data.
          paths-ignore: |
            tests
            benches
            examples
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
