# Publishes Rust crates to crates.io via Trusted Publishing (OIDC).
# Canonical policy: repos/docs/governance/publishing_guide.md
# No CARGO_REGISTRY_TOKEN secret is stored; token is minted per-run by
# rust-lang/crates-io-auth-action after the OIDC handshake.
#
# Supersedes the previous token-based release.yml (which used
# secrets.CARGO_REGISTRY_TOKEN). Revoke that secret after this workflow
# is verified working on crates.io.
#
# USER ACTION REQUIRED (one-time, per crate):
#   1. Register this repo + workflow filename (`release.yml`) + environment
#      (`release`) on crates.io under the crate's Settings -> Trusted
#      Publishing. See publishing_guide.md section 4.1.
#   2. Ensure target crates have `publish = true` (or no `publish` key) in
#      their Cargo.toml. Crates not yet registered should keep
#      `publish = false` and be omitted from the publish step below.

name: release-crates

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        working-directory: rust
        run: |
          cargo build --release
          cargo test --release

      - name: Authenticate with crates.io via OIDC
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish phenotype-policy-engine
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p phenotype-policy-engine

      # Add additional crates here as they are registered on crates.io:
      #   - phenotype-bid
      #   - phenotype-content-hash
      #   - phenotype-security-aggregator
      # phenotype-contracts is an internal contract crate; keep
      # publish = false until a real external consumer exists.
