# Clippy configuration for authvault
# Docs: https://doc.rust-lang.org/clippy/configuration.html
#
# NOTE: clippy.toml only accepts clippy-specific configuration keys
# (e.g. msrv, cognitive-complexity-threshold). Workspace-style
# [workspace] / [lints.rust] blocks belong in Cargo.toml, not here.

msrv = "1.75"
cognitive-complexity-threshold = 30
too-many-arguments-threshold = 8
type-complexity-threshold = 250
